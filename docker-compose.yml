services:
  db:
    image: postgres:14.1-alpine
    container_name: blockchain-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-blockchain_db}
    ports:
      - '5433:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - blockchain-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5 

  app:
    container_name: blockchain-app
    build:
      context: ./
      dockerfile: Dockerfile
    image: blockchain-app:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '${APP_PORT:-8000}:8000'
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-blockchain_db}
      ENV: ${ENV:-dev}
    networks:
      - blockchain-network

volumes:
  db_data:
    driver: local

networks:
  blockchain-network:
    driver: bridge