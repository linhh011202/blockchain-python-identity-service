app:
  name: "identity-service"
  env: "dev"

database:
  url: "postgresql+psycopg://postgres:postgres@localhost:5433/blockchain_db"

security:
  jwt:
    algorithm: "HS256"
    access_token_ttl_minutes: 15
    refresh_token_ttl_days: 14
    secret: "CHANGE_ME_DEV_SECRET"

rbac:
  default_role: "user"